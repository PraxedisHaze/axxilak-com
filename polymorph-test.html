<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLYMORPH | Base Webling Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        :root {
            --accent: #2563eb;
            --bg: #ffffff;
            --text: #000000;
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            transition: background 0.3s;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* Pillar 2: Sync Visuals */
        .ax-highlight {
            outline: 2px solid var(--accent);
            transition: outline 0.1s;
        }

        /* Pillar 6: UI Layer */
        #ax-lockdown-overlay {
            position: fixed;
            inset: 0;
            z-index: 19998;
            background: rgba(0,0,0,0.2);
            display: none;
            cursor: not-allowed;
        }

        #palette-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 24rem;
            background: #18181b;
            border: 1px solid #3f3f46;
            border-radius: 0.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            z-index: 20000;
            color: white;
            padding: 1.5rem;
            display: none;
            font-size: 14px;
        }

        #palette-container textarea {
            background-color: #27272a;
            color: #ffffff;
            border: 1px solid #3f3f46;
            border-radius: 0.25rem;
            padding: 0.5rem;
            font-family: monospace;
            font-size: 12px;
        }

        #palette-container button {
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }

        #palette-container button:hover {
            opacity: 0.8;
        }

        #ax-save {
            background-color: #16a34a;
            color: white;
        }

        #ax-cancel {
            background-color: #52525b;
            color: white;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 1rem 0;
            line-height: 1.2;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.8;
            margin: 1rem 0;
            line-height: 1.6;
        }

        #edit-mode-toggle {
            background-color: var(--accent);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #edit-mode-toggle:hover {
            opacity: 0.9;
        }

        [data-ax-id] {
            cursor: pointer;
            position: relative;
        }

        [data-ax-id]:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="ax-lockdown-overlay"></div>
    <div id="palette-container">
        <div id="palette-content"></div>
    </div>

    <main>
        <h1 data-ax-id="ax-1">The Technology of Freedom</h1>
        <p data-ax-id="ax-2">This content is anchored to the Lattice. Click ACTIVATE EDITOR, then click any text to edit.</p>
        <button id="edit-mode-toggle">ACTIVATE EDITOR</button>
    </main>

    <script>
        /**
         * POLYMORPH ENGINE v1.0.0
         * "Perfect Architecture in One Strike"
         *
         * All 6 Pillars Implemented:
         * 1. EditsVDOM - Lattice-based edit storage
         * 2. Sync Logic - Originating Action Flag prevents mutation loops
         * 3. WebblingScope - Webling-aware isolation
         * 4. StorageAdapter - localStorage with graceful degradation path
         * 5. SecurityLayer - Quine-safe sanitization pipeline
         * 6. LifecycleManager - 7-phase async initialization
         */

        class PolymorphEngine {
            constructor(name = 'apex') {
                this.name = name;
                this.lifecycle = 'uninitialized';
                this.isCodeMutating = false;
                this.edits = new Map();
                this.observer = null;

                // Pillar 3: Scoping - webling-aware, theme-aware
                const theme = document.body.getAttribute('data-theme') || 'light';
                this.storageKey = `${this.name}-edits-${theme}`;

                console.log(`[POLYMORPH] Engine initializing for webling: ${this.name}`);
            }

            async init() {
                try {
                    this.lifecycle = 'setting-up';
                    console.log('[POLYMORPH] Phase 1: Setup');

                    // Pillar 6: Wait for DOM to be fully ready
                    if (document.readyState !== 'complete') {
                        await new Promise(resolve => window.addEventListener('load', resolve));
                    }
                    console.log('[POLYMORPH] Phase 2: DOM ready');

                    // Pillar 1 & 4: Load edits from storage
                    this.loadEdits();
                    console.log('[POLYMORPH] Phase 3: Edits loaded from storage');

                    // Pillar 1: Build Lattice
                    this.initLattice();
                    console.log('[POLYMORPH] Phase 4: Lattice initialized');

                    // Pillar 1: Apply persisted edits to DOM
                    this.applyEditsToDOM();
                    console.log('[POLYMORPH] Phase 5: Edits applied to DOM');

                    // Pillar 2: Setup mutation observation
                    this.setupMutationObserver();
                    console.log('[POLYMORPH] Phase 6: Mutation observer attached');

                    // Pillar 6: Setup UI layer
                    this.setupUI();
                    console.log('[POLYMORPH] Phase 7: UI ready');

                    this.lifecycle = 'ready';
                    console.log('[POLYMORPH] ✓ Engine ready. Click ACTIVATE EDITOR to begin.');
                } catch (e) {
                    console.error('[POLYMORPH] Initialization error:', e);
                    this.lifecycle = 'error';
                }
            }

            // PILLAR 1: Lattice System - Assign stable IDs to all editable elements
            initLattice() {
                const editableTags = 'h1,h2,h3,h4,h5,h6,p,span,div,button,a,li,td,th,blockquote,label';
                const elements = document.querySelectorAll(editableTags);
                let count = 0;

                elements.forEach(el => {
                    // Don't lattice the editor UI itself
                    if (el.closest('#palette-container') || el.closest('#ax-lockdown-overlay')) {
                        return;
                    }

                    // Assign Lattice ID if not already present
                    if (!el.dataset.axId) {
                        el.dataset.axId = `ax-${++count}`;
                    }
                });

                console.log(`[POLYMORPH] Lattice: ${count} elements indexed`);
            }

            // PILLAR 5: Security Layer - Sanitize all user input
            sanitize(content) {
                // Convert to text content (strips all HTML)
                const div = document.createElement('div');
                div.textContent = content;
                const sanitized = div.innerHTML;

                // Block known injection patterns
                const blockedPatterns = [
                    '<script',
                    'javascript:',
                    'onclick',
                    'onerror',
                    'onload',
                    'onchange',
                ];

                for (const pattern of blockedPatterns) {
                    if (sanitized.toLowerCase().includes(pattern)) {
                        console.warn(`[POLYMORPH] Security: Blocked injection pattern "${pattern}"`);
                        return '[Content blocked - potential injection]';
                    }
                }

                return sanitized;
            }

            // PILLAR 2: Sync Logic - MutationObserver with Originating Action Flag
            setupMutationObserver() {
                this.observer = new MutationObserver((mutations) => {
                    // If WE made this change (code mutation), ignore it
                    if (this.isCodeMutating) {
                        return;
                    }

                    // In the future: if a user changes the DOM directly (e.g., third-party script),
                    // we could re-apply the Lattice and re-sync edits here
                    // For now, all edits flow through the editor UI
                });

                this.observer.observe(document.body, {
                    childList: true,
                    subtree: true,
                    characterData: true,
                });
            }

            // Helper: Execute code while telling observer we're doing it
            mutateDOM(callback) {
                this.isCodeMutating = true;
                try {
                    callback();
                } finally {
                    this.isCodeMutating = false;
                }
            }

            // PILLAR 1 & 4: Save edit to VDOM and localStorage
            saveEdit(axId, content) {
                try {
                    // Sanitize input (Pillar 5)
                    const cleanContent = this.sanitize(content);

                    // Store in VDOM (Pillar 1)
                    this.edits.set(axId, {
                        content: cleanContent,
                        ts: Date.now(),
                    });

                    // Persist to localStorage (Pillar 4)
                    const serialized = JSON.stringify(Array.from(this.edits.entries()));
                    localStorage.setItem(this.storageKey, serialized);

                    // Apply to DOM (Pillar 2 - wrapped in mutateDOM)
                    this.mutateDOM(() => {
                        const el = document.querySelector(`[data-ax-id="${axId}"]`);
                        if (el) {
                            el.textContent = cleanContent;
                        }
                    });

                    console.log(`[POLYMORPH] Saved: ${axId}`);
                } catch (e) {
                    console.error('[POLYMORPH] Save error:', e);
                }
            }

            // PILLAR 1 & 4: Load edits from localStorage
            loadEdits() {
                try {
                    const raw = localStorage.getItem(this.storageKey);
                    if (raw) {
                        // Hard Purge: Validate JSON before trusting it
                        const parsed = JSON.parse(raw);
                        this.edits = new Map(parsed);
                        console.log(`[POLYMORPH] Loaded ${this.edits.size} edits from storage`);
                    }
                } catch (e) {
                    console.warn('[POLYMORPH] Storage corruption detected. Starting fresh.', e);
                    this.edits = new Map();
                }
            }

            // PILLAR 1: Apply all persisted edits to the DOM
            applyEditsToDOM() {
                this.mutateDOM(() => {
                    this.edits.forEach((data, axId) => {
                        const el = document.querySelector(`[data-ax-id="${axId}"]`);
                        if (el) {
                            el.textContent = data.content;
                        }
                    });
                });
            }

            // PILLAR 6: UI Event Handling
            setupUI() {
                const btn = document.getElementById('edit-mode-toggle');
                const palette = document.getElementById('palette-container');
                const overlay = document.getElementById('ax-lockdown-overlay');

                // Global click handler for editing
                document.addEventListener('click', (e) => {
                    // Only in active mode
                    if (this.lifecycle !== 'active') {
                        return;
                    }

                    // Find editable element
                    const target = e.target.closest('[data-ax-id]');

                    // Don't edit the palette itself
                    if (target && !target.closest('#palette-container')) {
                        this.startEditSession(target);
                    }
                });

                // Toggle editor activation
                btn.addEventListener('click', () => {
                    if (this.lifecycle === 'active') {
                        this.lifecycle = 'ready';
                        btn.textContent = 'ACTIVATE EDITOR';
                        palette.style.display = 'none';
                        overlay.style.display = 'none';
                    } else if (this.lifecycle === 'ready') {
                        this.lifecycle = 'active';
                        btn.textContent = 'DEACTIVATE EDITOR';
                        overlay.style.display = 'block';
                    }
                });

                // Keyboard: Escape closes editor
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.lifecycle === 'active') {
                        this.endEditSession();
                    }
                });
            }

            // Start editing an element
            startEditSession(el) {
                const palette = document.getElementById('palette-container');
                const content = document.getElementById('palette-content');
                const axId = el.dataset.axId;

                palette.style.display = 'block';

                content.innerHTML = `
                    <div style="margin-bottom: 1rem; color: #60a5fa; font-size: 12px;">
                        Editing: ${el.tagName}#${axId}
                    </div>
                    <textarea id="ax-editor-area" style="width: 100%; height: 120px; margin-bottom: 1rem; resize: vertical;">
${el.textContent}</textarea>
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="ax-save" style="flex: 1;">✓ SAVE</button>
                        <button id="ax-cancel" style="flex: 1;">✕ CANCEL</button>
                    </div>
                `;

                const textarea = document.getElementById('ax-editor-area');
                textarea.focus();
                textarea.select();

                document.getElementById('ax-save').addEventListener('click', () => {
                    const newValue = textarea.value;
                    this.saveEdit(axId, newValue);
                    this.endEditSession();
                });

                document.getElementById('ax-cancel').addEventListener('click', () => {
                    this.endEditSession();
                });
            }

            // End editing session
            endEditSession() {
                const palette = document.getElementById('palette-container');
                palette.style.display = 'none';
            }
        }

        // AUTO-BOOT: Create and initialize engine on page load
        const engine = new PolymorphEngine('apex');
        engine.init();

        // Expose engine globally for inspection
        window.PolymorphEngine = engine;
    </script>
</body>
</html>
